# Workshop app overlay for shared Data Hub PostgreSQL
# Use with:
#   docker compose -f docker-compose.yml -f docker-compose.workshop.yml up -d workshop-app

services:
  workshop-app:
    build:
      context: ${WORKSHOP_APP_PATH:-../workshop}
      dockerfile: Dockerfile
    container_name: workshop-app
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SCHEMA: ${WORKSHOP_DB_SCHEMA:-workshop}
      PORT: 5000
      SMTP_HOST: ${WORKSHOP_SMTP_HOST:-}
      SMTP_PORT: ${WORKSHOP_SMTP_PORT:-587}
      SMTP_USER: ${WORKSHOP_SMTP_USER:-}
      SMTP_PASSWORD: ${WORKSHOP_SMTP_PASSWORD:-}
      SMTP_FROM: ${WORKSHOP_SMTP_FROM:-}
      SMTP_USE_TLS: ${WORKSHOP_SMTP_USE_TLS:-1}
      TELEGRAM_BOT_TOKEN: ${WORKSHOP_TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${WORKSHOP_TELEGRAM_CHAT_ID:-}
    volumes:
      - ${DATA_HUB_DATA_DIR:-./data}/workshop:/app/data
    ports:
      - "${WORKSHOP_APP_PORT:-8096}:5000"
    networks:
      - data-hub-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
