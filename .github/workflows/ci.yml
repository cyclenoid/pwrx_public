name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Build and Import Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/strava
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/strava/package-lock.json

      - name: Check adapter deploy key availability
        id: adapter_key
        env:
          PWRX_ADAPTER_KEY: ${{ secrets.PWRX_ADAPTER_KEY }}
        run: |
          if [ -n "$PWRX_ADAPTER_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PWRX_ADAPTER_KEY is not set. Backend private-adapter checks will be skipped."
          fi

      - name: Install dependencies
        if: steps.adapter_key.outputs.available == 'true'
        env:
          PWRX_ADAPTER_KEY: ${{ secrets.PWRX_ADAPTER_KEY }}
        run: |
          echo "Using deploy key for adapter dependency access."
          mkdir -p ~/.ssh
          printf '%s\n' "$PWRX_ADAPTER_KEY" > ~/.ssh/pwrx_adapter_key
          chmod 600 ~/.ssh/pwrx_adapter_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          ssh-keyscan -p 443 ssh.github.com >> ~/.ssh/known_hosts
          git config --global url."ssh://git@ssh.github.com:443/".insteadOf "ssh://git@github.com/"
          git config --global url."ssh://git@ssh.github.com:443/".insteadOf "git@github.com:"
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/pwrx_adapter_key -o IdentitiesOnly=yes -o UserKnownHostsFile=~/.ssh/known_hosts -o StrictHostKeyChecking=yes"
          npm ci
          rm -f ~/.ssh/pwrx_adapter_key

      - name: Lint backend
        if: steps.adapter_key.outputs.available == 'true'
        run: npm run lint

      - name: Build backend
        if: steps.adapter_key.outputs.available == 'true'
        run: npm run build

      - name: Run parser smoke tests
        if: steps.adapter_key.outputs.available == 'true'
        run: npm run test:import:parsers

      - name: Run import tests
        if: steps.adapter_key.outputs.available == 'true'
        run: npm run test:import

  frontend:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboards/strava
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboards/strava/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  docker-smoke:
    name: Docker Build Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build dashboard Docker image
        run: docker build -t pwrx-strava-dashboard-smoke ./dashboards/strava
